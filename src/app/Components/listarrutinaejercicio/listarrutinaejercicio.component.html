<div class="container wrapper">
  <div class="row">
      <!-- Issue table -->
      <div class="col-md-12">
          <div class="inner">

              <h3>Listado de rutinas ejercicios</h3>

              <tr>
                  <td>
                      <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/createplandeportivo']">Volver a inicio</button>
                  </td>

              </tr>
              <table class="table table-bordered">
                  <thead>


                      <tr>
                          <th scope="col">id</th>
                          <th scope="col">id_rutina</th>
                          <th scope="col">id_ejercicio</th>
                          <th scope="col">Acciòn</th>

                      </tr>
                  </thead>
                  <tbody>
                      <tr *ngFor="let p of Listarrutinaejercicio">

                          <td>{{p.id}}</td>
                          <td>{{p.id_rutina}}</td>
                          <td>{{p.id_ejercicio}}</td>


                          <td>

                              <button type="button" class="btn btn-danger btn-sm" (click)="deleterutinaejercicio(p.id)">Remove</button>
                              <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/editarrutinaejerciciodeportivo/', p.id]">Editar rutina ejercicio</button>

                          </td>


                      </tr>
                  </tbody>
              </table>
          </div>
      </div>
  </div>
</div>
