<div class="container">
  <legend>Editar dieta menú</legend>
  <form>

      <div class="form-group">
          <label class="form-label">Id dieta</label>
          <select type="number" name="id_dieta" id="textName" class="form-control" [(ngModel)]="dieta_menu.id_dieta">
              <option [value]="p.id_dieta" *ngFor="let p of Listadodietas">{{p.id_dieta}}</option>
          </select>
      </div>

      <div class="form-group">
          <label class="form-label">Id menú</label>
          <select type="number" name="id_menu" id="textName" class="form-control" [(ngModel)]="dieta_menu.id_menu">
              <option [value]="p.id_menu" *ngFor="let p of Listadomenus">{{p.id_menu}}</option>
          </select>
      </div>

      <button type="button" (click)="update()" class="btn btn-primary">Update</button>
      <a class="btn btn-primary" [routerLink]="['/createplandeportivo']">Cancel</a>
  </form>
</div>
