
<div class="container wrapper wrapper2">
  <div class="row">
      <!-- Form -->
      <div class="col-md-12">

          <h3>Registro de dietas menú</h3>
          <tr>
            <td>
                <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/createplandeportivo']">Volver a inicio</button>
            </td>

        </tr>
          <form [formGroup]="dietamenuForm" (ngSubmit)="submitForm()" novalidate>

              <div class="form-group">
                  <label class="form-label">Id dieta</label>
                  <select type="number" formControlName="id_dieta">
                      <option [value]="p.id_dieta" *ngFor="let p of Listadodieta">{{p.id_dieta}}-{{p.nombre}}</option>
                  </select>
              </div>

              <div class="form-group">
                  <label class="form-label">Id menú</label>
                  <select type="number" formControlName="id_menu">
                      <option [value]="p.id_menu" *ngFor="let p of Listadomenu">{{p.id_menu}}</option>
                  </select>
              </div>

              <button type="submit" class="btn btn-primary">Registrar dieta menú</button>
          </form>



      </div>
  </div>
</div>
