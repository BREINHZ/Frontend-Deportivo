<div class="container">
  <legend>Editar rutina ejercicioegend></legend>
  <form>

      <div class="form-group">
          <label class="form-label">Id rutina</label>
          <select type="number" name="id_rutina" id="textName" class="form-control" [(ngModel)]="rutina_ejercicio.id_rutina">
              <option [value]="p.id_rutina" *ngFor="let p of Listadorutinas">{{p.id_rutina}}-{{p.nombre}}</option>
          </select>
      </div>

      <div class="form-group">
        <label class="form-label">Id usuario</label>
        <select type="number" name="id_ejercicio" id="textName" class="form-control" [(ngModel)]="rutina_ejercicio.id_ejercicio">
            <option [value]="p.id_ejercicio" *ngFor="let p of Listadoejercicios">{{p.id_ejercicio}}-{{p.nombre}}</option>
        </select>
    </div>

      <button type="button" (click)="update()" class="btn btn-primary">Update</button>
      <a class="btn btn-primary" [routerLink]="['/createplandeportivo']">Cancel</a>
  </form>
</div>
