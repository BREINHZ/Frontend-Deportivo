<div class="container wrapper">
  <div class="row">
      <!-- Issue table -->
      <div class="col-md-12">
          <div class="inner">

              <h3>Listado de dietas deportivas</h3>

              <tr>
                  <td>
                      <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/createplandeportivo']">Volver a inicio</button>
                  </td>

              </tr>
              <table class="table table-bordered">
                  <thead>

                      <tr>
                          <th scope="col">id_dieta</th>
                          <th scope="col">nombre</th>
                          <th scope="col">objetivo</th>
                          <th scope="col">descripcion</th>



                      </tr>
                  </thead>
                  <tbody>
                      <tr *ngFor="let p of Listardietas">

                          <td>{{p.id_dieta}}</td>
                          <td>{{p.nombre}}</td>
                          <td>{{p.objetivo}}</td>
                          <td>{{p.descripcion}}</td>

                          <td>

                              <button type="button" class="btn btn-danger btn-sm" (click)="deletedieta(p.id_dieta)">Remove</button>
                              <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/editardietadeportiva/', p.id_dieta]">Editar dieta</button>

                          </td>


                      </tr>
                  </tbody>
              </table>
          </div>
      </div>
  </div>
</div>
