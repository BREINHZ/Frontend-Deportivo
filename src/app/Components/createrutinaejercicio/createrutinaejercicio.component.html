
<div class="container wrapper wrapper2">
  <div class="row">
      <!-- Form -->
      <div class="col-md-12">

          <h3>Registro de rutinas ejercicios</h3>
          <tr>
            <td>
                <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/createplandeportivo']">Volver a inicio</button>
            </td>

        </tr>
          <form [formGroup]="rutinaejercicioForm" (ngSubmit)="submitForm()" novalidate>

              <div class="form-group">
                  <label class="form-label">Escoja la rutina</label>
                  <select type="number" formControlName="id_rutina">
                      <option [value]="p.id_rutina" *ngFor="let p of Listadorutina">{{p.id_rutina}}-{{p.nombre}}</option>
                  </select>
              </div>

              <div class="form-group">
                  <label class="form-label">Escoja el ejercicio</label>
                  <select type="number" formControlName="id_ejercicio">
                      <option [value]="p.id_ejercicio" *ngFor="let p of Listadoejercicio">{{p.id_ejercicio}}-{{p.nombre}}</option>
                  </select>
              </div>

              <button type="submit" class="btn btn-primary">Registrar rutina ejercicio</button>
          </form>



      </div>
  </div>
</div>
