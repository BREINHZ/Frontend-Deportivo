<div class="container wrapper">
  <div class="row">
      <!-- Issue table -->
      <div class="col-md-12">
          <div class="inner">

              <h3>Listado de día alimentos</h3>

              <tr>
                  <td>
                      <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/createplandeportivo']">Volver a inicio</button>
                  </td>

              </tr>
              <table class="table table-bordered">
                  <thead>

                      <tr>
                          <th scope="col">id</th>
                          <th scope="col">id_alimento</th>
                          <th scope="col">id_dia</th>

                          <th scope="col">Acciòn</th>

                      </tr>
                  </thead>
                  <tbody>
                      <tr *ngFor="let p of Listardiasalimentos">

                          <td>{{p.id}}</td>
                          <td>{{p.id_alimento}}</td>
                          <td>{{p.id_dia}}</td>

                          <td>

                              <button type="button" class="btn btn-danger btn-sm" (click)="deletediaalimento(p.id)">Remove</button>
                              <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/editardiaalimento/', p.id]">Editar día alimento</button>

                          </td>


                      </tr>
                  </tbody>
              </table>
          </div>
      </div>
  </div>
</div>
