<div class="container wrapper">
  <div class="row">
      <!-- Issue table -->
      <div class="col-md-12">
          <div class="inner">

              <h3>Listado de rutinas</h3>

              <tr>
                  <td>
                      <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/createplandeportivo']">Volver a inicio</button>
                  </td>

              </tr>
              <table class="table table-bordered">
                  <thead>

                      <tr>
                          <th scope="col">id_alimentación</th>
                          <th scope="col">id_usuario</th>
                          <th scope="col">número día</th>

                          <th scope="col">Acciòn</th>

                      </tr>
                  </thead>
                  <tbody>
                      <tr *ngFor="let p of Listaralimentaciones">

                          <td>{{p.id_alimentacion}}</td>
                          <td>{{p.id_usuario}}</td>
                          <td>{{p.numero_dia}}</td>


                          <td>

                              <button type="button" class="btn btn-danger btn-sm" (click)="deletealimentacion(p.id_alimentacion)">Remove</button>
                              <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/editaralimentaciondeportiva/', p.id_alimentacion]">Editar alimentación</button>

                          </td>


                      </tr>
                  </tbody>
              </table>
          </div>
      </div>
  </div>
</div>
