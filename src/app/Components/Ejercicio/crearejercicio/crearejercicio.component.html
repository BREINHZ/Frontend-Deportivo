<div class="container wrapper wrapper2">
  <div class="row">
      <!-- Form -->
      <div class="col-md-12">

        <h3 class="titulo">Registro de ejercicios</h3>
        <tr>
          <td>
              <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/createplandeportivo']">Volver a inicio</button>
          </td>

      </tr>
          <form [formGroup]="ejercicioForm" (ngSubmit)="submitForm()" novalidate>
              <div class="form-group">

                  <div class="form-group">
                    <label class="label-verde">Nombre</label>
                      <input type="text" formControlName="nombre" class="form-control">
                  </div>

                  <div class="form-group">
                    <label class="label-verde">Dificultad</label>
                      <input type="text" formControlName="dificultad" class="form-control">
                  </div>

                  <div class="form-group">
                    <label class="label-verde">Link o id_youtobe</label>
                      <input type="text" formControlName="id_youtube" class="form-control">
                  </div>

                  <div class="form-group">
                    <label class="label-verde">Link Imagen</label>
                      <input type="text" formControlName="imagen" class="form-control">
                  </div>

                  <div class="form-group">
                    <label class="label-verde">Estiramiento</label>
                      <input type="text" formControlName="estiramiento" class="form-control">
                  </div>

              </div>
              <button type="submit" class="btn btn-primary">Submit</button>
          </form>

      </div>
  </div>
</div>
