<div class="container wrapper">
  <div class="row">
      <!-- Issue table -->
      <div class="col-md-12">
          <div class="inner">

              <h3>Listado de ejercicios deportivos</h3>

              <tr>
                  <td>
                      <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/createplandeportivo']">Volver a inicio</button>
                  </td>

              </tr>
              <table class="table table-bordered">
                  <thead>

                      <tr>
                          <th scope="col">id_ejercicio</th>
                          <th scope="col">nombre</th>
                          <th scope="col">dificultad</th>
                          <th scope="col">estiramiento</th>
                          <th scope="col">Link youtube</th>
                          <th scope="col">Link imagen ejercicio</th>
                          <th scope="col">Acciòn</th>

                      </tr>
                  </thead>
                  <tbody>
                      <tr *ngFor="let p of Listarejercicios">

                          <td>{{p.id_ejercicio}}</td>
                          <td>{{p.nombre}}</td>
                          <td>{{p.dificultad}}</td>
                          <td>{{p.estiramiento}}</td>
                          <td>{{p.id_youtube}}</td>
                          <td>{{p.imagen}}</td>

                          <td>

                              <button type="button" class="btn btn-danger btn-sm" (click)="deleteejercicio(p.id_ejercicio)">Remove</button>
                              <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/editarejerciciodeportivo/', p.id_ejercicio]">Editar ejecicio</button>

                          </td>


                      </tr>
                  </tbody>
              </table>
          </div>
      </div>
  </div>
</div>
