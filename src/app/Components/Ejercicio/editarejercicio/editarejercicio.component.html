<div class="container">
  <legend>Editar ejercicio</legend>
  <form>

      <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" name="nombre" id="textName" class="form-control" [(ngModel)]="ejercicio.nombre">
      </div>

      <div class="mb-3">
          <label class="form-label">Dificultad</label>
          <input type="text" name="dificultad" id="textName" class="form-control" [(ngModel)]="ejercicio.dificultad">
      </div>

      <div class="mb-3">
        <label class="form-label">Estiramiento</label>
        <input type="text" name="estiramiento" id="textName" class="form-control" [(ngModel)]="ejercicio.estiramiento">
      </div>

      <div class="mb-3">
        <label class="form-label">Link youtube</label>
        <input type="text" name="id_youtube" id="textName" class="form-control" [(ngModel)]="ejercicio.id_youtube">
      </div>

      <div class="mb-3">
        <label class="form-label">Link imagen</label>
        <input type="text" name="imagen" id="textName" class="form-control" [(ngModel)]="ejercicio.imagen">
      </div>


      <button type="button" (click)="update()" class="btn btn-primary">Update</button>
      <a class="btn btn-primary" [routerLink]="['/createplandeportivo']">Cancel</a>
  </form>
</div>
