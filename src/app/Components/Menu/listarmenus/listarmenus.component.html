<div class="container wrapper">
  <div class="row">
      <!-- Issue table -->
      <div class="col-md-12">
          <div class="inner">

              <h3>Listado de menus deportivos</h3>

              <tr>
                  <td>
                      <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/createplandeportivo']">Volver a inicio</button>
                  </td>

              </tr>
              <table class="table table-bordered">
                  <thead>

                      <tr>
                          <th scope="col">id_menu</th>
                          <th scope="col">desayuno</th>
                          <th scope="col">cena</th>
                          <th scope="col">merienda</th>
                          <th scope="col">almuerzo</th>
                          <th scope="col">Acciòn</th>

                      </tr>
                  </thead>
                  <tbody>
                      <tr *ngFor="let p of Listarmenus">

                          <td>{{p.id_menu}}</td>
                          <td>{{p.desayuno}}</td>
                          <td>{{p.cena}}</td>
                          <td>{{p.merienda}}</td>
                          <td>{{p.almuerzo}}</td>

                          <td>

                              <button type="button" class="btn btn-danger btn-sm" (click)="deletemenu(p.id_menu)">Remove</button>
                              <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/editarmenudeportivo/', p.id_menu]">Editar menú</button>

                          </td>


                      </tr>
                  </tbody>
              </table>
          </div>
      </div>
  </div>
</div>
