<div class="container wrapper wrapper2">
  <div class="row">
      <!-- Form -->
      <div class="col-md-12">

        <h3 class="titulo">Registro de menús deportivos</h3>
        <tr>
          <td>
              <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/createplandeportivo']">Volver a inicio</button>
          </td>

      </tr>
          <form [formGroup]="menuForm" (ngSubmit)="submitForm()" novalidate>
              <div class="form-group">

                  <div class="form-group">
                    <label class="label-verde">Desayuno</label>
                      <input type="text" formControlName="desayuno" class="form-control">
                  </div>

                  <div class="form-group">
                    <label class="label-verde">Cena</label>
                      <input type="text" formControlName="cena" class="form-control">
                  </div>

                  <div class="form-group">
                    <label class="label-verde">Merienda</label>
                      <input type="text" formControlName="merienda" class="form-control">
                  </div>

                  <div class="form-group">
                    <label class="label-verde">Almuerzo</label>
                      <input type="text" formControlName="almuerzo" class="form-control">
                  </div>

              </div>
              <button type="submit" class="btn btn-primary">Submit</button>
          </form>

      </div>
  </div>
</div>
