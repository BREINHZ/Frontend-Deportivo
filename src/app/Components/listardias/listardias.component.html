<div class="container wrapper">
  <div class="row">
      <!-- Issue table -->
      <div class="col-md-12">
          <div class="inner">

              <h3>Listado de días</h3>

              <tr>
                  <td>
                      <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/createplandeportivo']">Volver a inicio</button>
                  </td>

              </tr>
              <table class="table table-bordered">
                  <thead>

                      <tr>
                          <th scope="col">id_dia</th>
                          <th scope="col">fecha</th>
                          <th scope="col">kilocalorias</th>
                          <th scope="col">fibra</th>
                          <th scope="col">grasa</th>
                          <th scope="col">carbohidratos</th>
                          <th scope="col">proteina</th>
                          <th scope="col">id_alimentacion</th>

                          <th scope="col">Acciòn</th>

                      </tr>
                  </thead>
                  <tbody>
                      <tr *ngFor="let p of Listardias">

                          <td>{{p.id_dia}}</td>
                          <td>{{p.fecha}}</td>
                          <td>{{p.kilocalorias}}</td>
                          <td>{{p.fibra}}</td>
                          <td>{{p.grasa}}</td>
                          <td>{{p.carbohidratos}}</td>
                          <td>{{p.proteina}}</td>
                          <td>{{p.id_alimentacion}}</td>

                          <td>

                              <button type="button" class="btn btn-danger btn-sm" (click)="deletedia(p.id_dia)">Remove</button>
                              <button type="button" class="btn btn-success btn-sm move-right" [routerLink]="['/editardia/', p.id_dia]">Editar día</button>

                          </td>


                      </tr>
                  </tbody>
              </table>
          </div>
      </div>
  </div>
</div>
